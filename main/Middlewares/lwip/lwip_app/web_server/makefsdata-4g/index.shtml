
<html lang="zh-CN">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=gbk"/>
        <style>
            .flex{
                flex-flow:row wrap;
                display: flex;
                width: 100%;
                height: 100%;
            }
            *{
                margin: 0;
                padding: 0;
                box-sizing:border-box;
                cursor: pointer;

            }
            .switch {
                position: relative;
                display: inline-block;
                width: 60px;
                height: 34px;
                margin-left: 10px;
            }
            .switch input {display:none;}

            .slider {
                position: absolute;
                cursor: pointer;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: #ccc;
                -webkit-transition: .4s;
                transition: .4s;
            }

            .slider:before {
                position: absolute;
                content: "";
                height: 26px;
                width: 26px;
                left: 4px;
                bottom: 4px;
                background-color: white;
                -webkit-transition: .4s;
                transition: .4s;
            }

            input:checked + .slider {
                background-color: #2196F3;
            }

            input:focus + .slider {
                box-shadow: 0 0 1px #2196F3;
            }

            input:checked + .slider:before {
                -webkit-transform: translateX(26px);
                -ms-transform: translateX(26px);
                transform: translateX(26px);
            }

            /* Rounded sliders */
            .slider.round {
                border-radius: 34px;
            }

            .slider.round:before {
                border-radius: 50%;
            }
            .nav{
                font-size: 40px;

            }
            .blue{
                background: #00f9;
            }
            button{
                padding: 10px;
                width: 300px;

            }
            #content{
                display: flex;
                flex-direction: column;
                align-items: center;
                padding-top: 20px;
                overflow-y: auto;
            }

            #loginshado{
                display: flex;
                flex-direction: column;
                align-items: center;

                padding-top: 100px;
                width: 100%;
                height: 100%;
                background: #000f;
                position: fixed;
                display: flex;
            }
            #login{
                display: flex;
                flex-direction: column;
                align-items: center;
                background: #fff;
                width: 600px;
                height: 400px;
                justify-content: center;
            }
            .from {
                display: flex;
                margin: 20px 0;
                width: 330px;

            }

            .from span{
                min-width: 120px;
                text-align: left;
                white-space: nowrap;
            }
            input,select {
                width: 200px;
                height: 30px;
                margin-left: 2%;
                padding-left: 5px;
                border-radius: 3px;
                border: 1px solid #919191;
            }
            .va-table{
                width: 70%;
                overflow-x: auto;
                padding: 10px 20px 20px;
                margin: 0 auto;
            }
            .va-grid{
                display: grid;
                grid-template-columns: 110px repeat(4, minmax(150px, 1fr));
                column-gap: 28px;
                row-gap: 22px;
                width: 100%;
                margin: 0;
                align-items: center;
            }
            .va-head{
                font-size: 20px;
                color: #000;
                text-align: center;
                white-space: nowrap;

            .va-side{
                font-size: 18px;

            .va-input{

    <script>
        var View={
            init(model,nav){
                this.model=model
                this.nav=nav
                this.selectindex=1
                this.loadcontent(0,this.model[0])
                this.loadnav(this.selectindex)
            },
            loop(){
                    this.loadcontent(this.selectj,this.selectdata)
            },
            labelhtml(i,style,label){
                return [
                    '<p onclick="View.setNav(',i,')" class="nav ',style,'">',
                        label,
                    '<p>'
                ].join('')
            },
            setNav(v){
                document.getElementById('content').innerHTML=""
                this.loadnav(v)
            },
            loadnav(v){
                var html=""
                for(var i=0;i<this.model.length;i++){
                    if(this.model[i].label){
                        html+=this.labelhtml(i,i==v?"blue":"",this.model[i].label)
                    }
                }
                this.loadcontent(v,this.model[v])
                this.nav.innerHTML=html
            },
            inputhtml(data,j,i){
                data[1]=data[1].replace(/<.*>/g,'')
                classname="from"
                var checked=data[3]==1?"checked":"";
                var s1=['<div class="switch">',
                            '<label class="switch">',
                                '<input type="checkbox" ',checked,' onchange="View.switchChange(',j,',',i,',3)">',
                                '<div class="slider round"></div>',
                            '</label>',
                        '</div>'].join('')
                var s2=data[3]!=undefined?s1:"";
                return [
                    '<div class="',classname,'">',
                        '<span>',data[0],':</span>',
                        '<input value="',data[1],'" name="',data[2],'"/>',
                        s2,
                    '</div>'
                ].join('')
            },
            inputhtmlVA(data,j,i){
                data[1]=data[1].replace(/<.*>/g,'')
                return [
                    '<input class="va-input" value="',data[1],'" name="',data[2],'"/>'
                ].join('')
            },
            renderVACollection(data,j){
                var headers=["电压(V)","电流(A)","功率(W)","用电量(kWh)"]
                var html=['<div class="va-table"><div class="va-grid">']
                html.push('<div></div>')
                for(var h=0;h<headers.length;h++){
                    html.push('<div class="va-head">',headers[h],'</div>')
                }
                var rowCount=Math.ceil(data.nodes.length/4)
                for(var r=0;r<rowCount;r++){
                    var rowLabel=r===0?'输入':'通道'+r
                    html.push('<div class="va-side">',rowLabel,'</div>')
                    for(var c=0;c<4;c++){
                        var idx=r*4+c
                        if(data.nodes[idx]){
                            html.push(this.inputhtmlVA(data.nodes[idx],j,idx))
                        }else{
                            html.push('<div></div>')
                        }
                    }
                }
                html.push('</div></div>')
                return html.join('')
            },
            inputhtmlCameraUser(data,j,i){
                data[1]=data[1].replace(/<.*>/g,'')
                return [
                    '<input class="camera-user-input" value="',data[1],'" name="',data[2],'"/>'
                ].join('')
            },
            renderCameraUser(data,j){
                var headers=["账号","密码"]
                var html=['<div class="camera-user-table"><div class="camera-user-grid">']
                html.push('<div></div>')
                for(var h=0;h<headers.length;h++){
                    html.push('<div class="camera-user-head">',headers[h],'</div>')
                }
                var rowCount=Math.ceil(data.nodes.length/2)
                for(var r=0;r<rowCount;r++){
                    html.push('<div class="camera-user-side">摄像机',r+1,'</div>')
                    for(var c=0;c<2;c++){
                        var idx=r*2+c
                        if(data.nodes[idx]){
                            html.push(this.inputhtmlCameraUser(data.nodes[idx],j,idx))
                        }else{
                            html.push('<div></div>')
                        }
                    }
                }
                html.push('</div></div>')
                return html.join('')
            },
            snmpOidSectionHtml(title,labelKeys,nodes,startIdx){
                var html=['<div class="snmp-oid-section">'];
                html.push('<div class="snmp-oid-section-title">',title,'</div>');
                html.push('<div class="snmp-oid-grid">');
                for(var k=0;k<labelKeys.length;k++){
                    if((k%2)==0){
                        html.push('<span class="snmp-oid-label">',labelKeys[k],'</span>');
                        var idx=startIdx+k;
                        if(idx<nodes.length){
                            html.push('<input class="snmp-oid-input" value="',nodes[idx][1],'" name="',nodes[idx][2],'"/>');
                        }else{
                            html.push('<span></span>');
                        }
                    }else{
                        html.push('<span class="snmp-oid-label">',labelKeys[k],'</span>');
                        var idx2=startIdx+k;
                        if(idx2<nodes.length){
                            html.push('<input class="snmp-oid-input" value="',nodes[idx2][1],'" name="',nodes[idx2][2],'"/>');
                        }else{
                            html.push('<span></span>');
                        }
                    }
                }
                html.push('</div></div>');
                return html.join('');
            },
            renderSnmpOid(data,j){
                var html=['<div class="snmp-oid-table">'];
                /* IPC 海康 (nodes 0-6) */
                html.push(this.snmpOidSectionHtml('IPC 海康',
                    ['品牌','型号','序列号','CPU','内存','码流','MAC地址'],
                    data.nodes,0));
                /* IPC 大华 (nodes 7-13) */
                html.push(this.snmpOidSectionHtml('IPC 大华',
                    ['品牌','型号','序列号','CPU','内存','码流','MAC地址'],
                    data.nodes,7));
                /* IPC 宇视 (nodes 14-20) */
                html.push(this.snmpOidSectionHtml('IPC 宇视',
                    ['品牌','型号','序列号','CPU','内存','码流','MAC地址'],
                    data.nodes,14));
                /* 光猫 (nodes 21-24) */
                html.push(this.snmpOidSectionHtml('光猫',
                    ['品牌','型号','光功率','端口'],
                    data.nodes,21));
                /* 交换机 (nodes 25-29) */
                html.push(this.snmpOidSectionHtml('交换机',
                    ['品牌','型号','端口','POE','POE功率'],
                    data.nodes,25));
                html.push('</div>');
                return html.join('');
            },
            switchChange(j,i,key){
                key=key||1
                var data=View.model[j].nodes[i]
                data[key]=data[key]=='1'?'0':'1'
                console.log('switchChange')
                View.click("switch",[['',data[key],data[2]+'_switch']])
            },
            swichhtml(data,j,i){
                checked=data[1]=='1'?'checked':""
                return [
                    '<div class="from">',
                        '<span>',data[0],':</span>',
                        '<label class="switch">',
                            '<input type="checkbox" ',checked,' onchange="View.switchChange(',j,',',i,')">',
                            '<div class="slider round"></div>',
                        '</label>',
                    '</div>'
                ].join('')
            },
            selectChange(j,i){
                var data=View.model[j].nodes[i]
                data[1]=document.getElementById('select'+j+''+i).value
                console.log('selectChange',data)
                if (data[2] === 'dev_type') {
                    var currentVals = View.model[j].nodes.map(n => n[1] || "0");
                    var cmdNodeIndex = View.model[j].nodes.findIndex(n => n[2] === 'oid_cmd');
                    if (cmdNodeIndex !== -1) {
                        currentVals[cmdNodeIndex] = "0";
                    }
                    View.render(currentVals, View.model[j], j);
                }
                View.click("select",[data])
            },
            selecthtml(data,j,i){
                var rt=['<select name="',data[2],'" id="select',j,i,'" onchange="View.selectChange(',j,',',i,')">'].join('')
                for(var i=0;i<data[3].options.length;i++){
                    console.log('selected',i,data[1],i==parseInt(data[1]))
                    selected=i==parseInt(data[1])?'selected':''
                    rt+='<option value="'+i+'" '+selected+'>'+data[3].options[i]+'</options>'
                }
                rt+='</select>'
                return [
                    '<div class="from">',
                        '<span>',data[0],':</span>',
                        rt,
                    '</div>'
                ].join('')
            },
            btnhtml(i,data){
                var style = this.model[i].btntype=="caremaSetting" ? 'text-align:left; width:650px;' : 'text-align:center';
                return [
                    '<div style="',style,'"><button class="button" onclick="View.click(\'',data[1],'\',',i,')">',
                        data[0],
                    '</button></div>'
                ].join("")
            },
            render(s,data,j){

                var html="";
                console.log('loadcontent',s,data,j)
                for(var i=0;i<data.nodes.length;i++){
                    if(s[i]!==undefined&&s[i]!==null){
                        data.nodes[i][1]=s[i]+''
                    }
                }
                if(data.btntype=="VACollection"){
                    html = this.renderVACollection(data,j)
                    document.getElementById(data.divid).innerHTML=html
                    return
                }else if(data.btntype=="carema_user"){
                    html = this.renderCameraUser(data,j)
                    document.getElementById(data.divid).innerHTML=html
                    return
                }else if(data.btntype=="snmp_set"){
                    html = this.renderSnmpOid(data,j)
                    if(data.btns!=undefined){
                        for(var i=0;i<data.btns.length;i++){
                            html+=this.btnhtml(j,data.btns[i])
                        }
                    }
                    document.getElementById(data.divid).innerHTML=html
                    return
                }
                for(var i=0;i<data.nodes.length;i++){
                    if (data.nodes[i][2] === 'oid_cmd') {
                        var devTypeNode = data.nodes.find(n => n[2] === 'dev_type');
                        if (devTypeNode) {
                            var devTypeVal = parseInt(devTypeNode[1] || "0");
                            if(devTypeVal <= 2) {
                                data.nodes[i][3].options = ["品牌", "型号", "序列号", "CPU使用率", "内存使用率", "实时码流", "MAC地址"];
                            } else if(devTypeVal == 3) {
                                data.nodes[i][3].options = ["品牌", "型号", "光功率", "端口状态"];
                            } else if(devTypeVal == 4) {
                                data.nodes[i][3].options = ["品牌", "型号", "端口状态", "POE状态", "POE功率"];
                            }
                        }
                    }
                    var item_html = "";
                    if(data.nodes[i][3]&&typeof data.nodes[i][3]=='object'){
                        if(data.nodes[i][3].type=="switch"){
                            item_html=this.swichhtml(data.nodes[i],j,i)
                        }else{
                            item_html=this.selecthtml(data.nodes[i],j,i)
                        }
                    }else{
                        item_html=this.inputhtml(data.nodes[i],j,i)
                    }

                    if (data.btntype=="caremaSetting" && data.nodes[i][0].indexOf('摄像机') === 0 && data.nodes[i][0].length > 3 && data.nodes[i][2] !== 'camera_tran') {
                        html += '<div style="display:flex; flex-direction:row; width:650px; justify-content: flex-start;">' + item_html;
                    } else if (data.btntype=="caremaSetting" && data.nodes[i][2] === 'camera_tran') {
                        item_html = item_html.replace('class="from"', 'class="from" style="width:650px;"');
                        html += item_html;
                    } else if (data.btntype=="caremaSetting" && data.nodes[i][0] === '品牌' && i > 0 && data.nodes[i-1][0].indexOf('摄像机') === 0 && data.nodes[i-1][0].length > 3) {
                        // 为了紧凑显示，将from 的宽度设置为220px，并去除“品牌”文字
                        item_html = item_html.replace('class="from"', 'class="from" style="width:220px; margin-left:10px;"');
                        item_html = item_html.replace('<span>品牌:</span>', '');
                        html += item_html + '</div>';
                    } else {
                        html += item_html;
                    }
                }
                if(data.btns!=undefined){
                    for(var i=0;i<data.btns.length;i++){
                        html+=this.btnhtml(j,data.btns[i])
                    }
                }
                document.getElementById(data.divid).innerHTML=html
            },
            loadcontent(j,data){
                this.selectj=j
                this.selectdata=data
                if(j==0){
                    this.render([],data,j)
                }else{
                    if(document.getElementById(data.divid).querySelector('button')==null){
                        this.get('/setting.cgi?btntype='+data.btntype,(s)=>this.render(s[1],data,j))
                    }

                }
            },
            get(url,back){
                xmlhttp=null;
                if (window.XMLHttpRequest)
                {
		            xmlhttp=new XMLHttpRequest();
                }
                else if (window.ActiveXObject)
		        {// code for IE6, IE5
		            xmlhttp=new ActiveXObject("Microsoft.XMLHTTP");
		        }
		        if (xmlhttp!=null)
		        {
                    xmlhttp.onreadystatechange=()=>{
                        if (xmlhttp.readyState==4&&back){
                            var data=xmlhttp.responseText
                            try {
                                data=JSON.parse(data.replace(/<.*>/g,''))
                            } catch (error) {
                                data=[500,'解析错误'+data,data.replace(/<.*>/g,'')]
                            }
                            back(data)
                        }
                        //console.log(xmlhttp.readyState,xmlhttp.status)
                    }
                    xmlhttp.open("GET",url,true);
                    xmlhttp.send(null);
                }
		        else
		        {
		            alert("Your browser does not support XMLHTTP.");
		        }
            },
            click(name,i){
                var s='/setting.cgi?btntype='+name
                var nodes=i
                if(typeof i=='number'){
                    nodes=this.model[i].nodes
                }
                if(i!=0){
                    nodes=this.model[0].nodes.concat(nodes)
                }
                var oj={}
                nodes.forEach((element,n,a) => {
                    var input=document.getElementsByName(element[2])[0]
                    if(input){
                        oj[element[2]]=input.value
                        s=s+'&'+element[2]+'='+encodeURIComponent(input.value)
                    }else{
                        oj[element[2]]=element[1]
                        s=s+'&'+element[2]+'='+encodeURIComponent(element[1])
                    }
                });
                console.log("get",name,oj)
                if(name=="changePassword"||name=="set_save"){
                    
                    var map={changePassword:"password",set_save:"d"}
                    let p=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[\s\S]{8,12}$/
                    if(!p.test(oj[map[name]])){
                        return alert("请输入正确的密码格式：\n密码长度:8-12\n密码由数字+大写英文字母+小写英文字母组成")
                    }
                }
                this.get(s,(d)=>this.clickback(d,name))
            },
            clickback(d,name){
                console.log(name,d)
                if(name=="login"&&d[2]=='1'){
                    this.render([],modelChangePassword,0)
                    return
                }
                document.getElementById('loginshado').style.display=d[0]==401?'':'none'
                if(d[1]){
                    alert(d[1])
                }
            }
        }
        View.init(model,document.getElementById('nav'))
        if(loopTime){
            setInterval(()=>View.loop(),loopTime)
        }
        //View.clickback([0,''])
        //View.setNav(0)
    </script>
</html>
